<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Visionário Motors</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

  <style>
    :root {
      --preto: #0a0a0a;
      --preto-2: #131313;
      --dourado: #f7c600;
      --dourado-claro: #ffd94d;
      --dourado-escuro: #c79e00;
    }

    * { font-family: 'Manrope', sans-serif; }

    body {
      background:
        radial-gradient(ellipse 900px 500px at 85% 15%, rgba(247,198,0,0.12), transparent 60%),
        radial-gradient(ellipse 700px 500px at 10% 90%, rgba(247,198,0,0.07), transparent 55%),
        var(--preto-2);
      min-height: 100vh;
    }

    .card-login {
      background: #161616;
      border: 1px solid #262626;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 50px -20px rgba(0,0,0,0.6);
    }

    .lado-marca {
      background: linear-gradient(155deg, #151515, #0a0a0a);
      border-right: 1px solid #262626;
    }

    .lado-marca h1 {
      font-size: 2.6rem;
      font-weight: 800;
      letter-spacing: -0.01em;
    }

    .lado-marca .parte-1 { color: var(--dourado); }
    .lado-marca .parte-2 { color: #fff; }

    .lado-marca .linha-dourada {
      width: 70px;
      height: 4px;
      background: linear-gradient(90deg, var(--dourado-claro), var(--dourado-escuro));
      border-radius: 999px;
      margin: 18px auto 0;
    }

    .lado-marca p { color: #9a9a9a; font-size: 0.9rem; margin-top: 16px; }

    .lado-form { color: #f0f0f0; }

    .lado-form h6 { color: #c8c8c8; font-weight: 700; font-size: 0.85rem; margin-bottom: 8px; }

    .meu-input {
      background: #0e0e0e;
      border: 1px solid #2a2a2a;
      color: #fff;
      padding: 11px 14px;
      border-radius: 8px;
    }

    .meu-input:focus {
      background: #0e0e0e;
      border-color: var(--dourado-escuro);
      color: #fff;
      box-shadow: 0 0 0 3px rgba(247,198,0,0.15);
    }

    .meu-input::placeholder { color: #5a5a5a; }

    .btn-dourado {
      background: linear-gradient(135deg, var(--dourado-claro), var(--dourado-escuro));
      color: #0a0a0a;
      font-weight: 800;
      border: none;
      border-radius: 8px;
      padding: 12px;
      transition: filter 0.15s ease;
    }
    .btn-dourado:hover { filter: brightness(1.06); }

    .voltar-loja { color: #9a9a9a; font-size: 0.85rem; text-decoration: none; }
    .voltar-loja:hover { color: var(--dourado); }
  </style>
</head>
<body>

<div class="container-fluid d-flex justify-content-center align-items-center min-vh-100 py-4">
  <div class="row card-login m-0" style="width: 1000px; min-height: 540px;">

    <div class="col-md-6 d-flex justify-content-center align-items-center text-center lado-marca p-4">
      <div>
        <h1><span class="parte-1">VISIONÁRIO</span><br><span class="parte-2">MOTORS</span></h1>
        <div class="linha-dourada"></div>
        <p>Painel administrativo do estoque</p>
      </div>
    </div>

    <div class="col-md-6 d-flex justify-content-center align-items-center p-5 lado-form">
      <div class="w-100" style="max-width: 340px;">

        <h2 class="text-center mb-4 fw-bold">Login</h2>

        <form id="formLogin" action="/api/login" method="POST">

          <h6>Usuário</h6>
          <div class="mb-3">
            <input class="form-control meu-input" placeholder="admin" type="text" name="usuario" autocomplete="username">
          </div>

          <h6>Senha</h6>
          <div class="mb-4">
            <input class="form-control meu-input" placeholder="Senha" type="password" name="senha" autocomplete="current-password">
          </div>

          <div class="text-center mb-3">
            <button type="submit" class="btn btn-dourado w-100">Entrar</button>
          </div>

        </form>

        <p id="mensagemLogin" class="text-center small"></p>

        <p class="text-center mt-3">
          <a href="/" class="voltar-loja">&larr; Voltar para a loja</a>
        </p>

      </div>
    </div>

  </div>
</div>

<script>
document.getElementById("formLogin").addEventListener("submit", async function(event) {
    event.preventDefault();

    const form = event.target;
    const dados = new FormData(form);
    const botao = form.querySelector('button[type="submit"]');
    const mensagem = document.getElementById("mensagemLogin");

    botao.disabled = true;
    mensagem.className = "text-center small text-secondary";
    mensagem.innerText = "Entrando...";

    try {
        const resposta = await fetch("/api/login", {
            method: "POST",
            body: dados
        });

        const resultado = await resposta.json();

        if (resultado.ok) {
            mensagem.className = "text-success text-center small";
            mensagem.innerText = resultado.mensagem;
            window.location.href = "/admin";
        } else {
            mensagem.className = "text-danger text-center small";
            mensagem.innerText = (resultado.erros || ["Erro ao entrar."]).join(", ");
            botao.disabled = false;
        }
    } catch (erro) {
        console.error("Erro no login:", erro);
        mensagem.className = "text-danger text-center small";
        mensagem.innerText = "Erro ao conectar com o servidor. Tente novamente.";
        botao.disabled = false;
    }
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
